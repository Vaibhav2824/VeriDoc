services:
  - type: web
    name: veridoc-api
    runtime: python
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run uvicorn services.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: CONFIDENCE_THRESHOLD
        value: "0.80"
    healthCheckPath: /health
