name: Eval regression gate

# Manual trigger only — NOT on every push/PR.
#
# Free-tier VLM daily quotas are small relative to the benchmark: a single
# pass over the 100-doc corpus needs ~200 VLM calls, and in practice this
# has been enough to exhaust Groq's and Gemini's free-tier daily caps in
# one run (see eval/REPORT.md "Known limitation" note). Running this on
# every push would burn the day's quota on CI instead of development and
# would fail spuriously on quota exhaustion rather than real regressions.
# Trigger manually when you have fresh quota and want to confirm the
# benchmark hasn't regressed below the M0 baseline.

on:
  workflow_dispatch:
    inputs:
      tolerance:
        description: "Allowed drop below the M0 baseline before failing"
        required: false
        default: "0.02"

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run regression gate
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run python -m eval.regression --tolerance "${{ inputs.tolerance }}"
